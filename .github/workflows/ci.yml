name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      - run: npm run test --if-present
      - run: npm run build --if-present
      # Nota: gli e2e Electron in CI possono richiedere xvfb-run; aggiungere uno step dedicato quando i test e2e sono pronti.
