name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (Electron)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      # better-sqlite3-multiple-ciphers include SQLCipher internamente:
      # nessun libsqlcipher-dev necessario, nessun flag SQLCIPHER=1.
      # I prebuilt per Node.js vengono scaricati da npm ci e sono
      # sufficienti per i test Vitest (che girano su Node, non Electron).

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (Electron — verifica che il bundle compili)
        run: npm run build:electron
        env:
          CI: true
