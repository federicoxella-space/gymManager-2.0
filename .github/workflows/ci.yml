name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts salta postinstall (electron-builder install-app-deps)
        # che sostituirebbe i prebuilt Node.js di better-sqlite3-multiple-ciphers
        # con quelli per Electron (ABI diverso), rompendo i test Vitest.
        # Le dipendenze di sistema GTK/WebKit non servono: ci.yml non avvia
        # Electron, esegue solo typecheck/lint/test(Vitest)/build(Vite).
        run: npm ci --ignore-scripts

      # better-sqlite3-multiple-ciphers non pubblica prebuilt per runtime=node su
      # linux/win32, quindi si ricade su node-gyp per compilare da sorgente.
      # Python 3.12 (default su ubuntu-latest) ha rimosso distutils: setuptools
      # lo ripristina. SQLCipher è bundled, nessuna dipendenza esterna.
      - name: Install setuptools (distutils rimosso in Python 3.12, richiesto da node-gyp)
        run: pip install setuptools

      - name: Rebuild native module for Node.js (tests)
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (Electron — verifica che il bundle compili)
        run: npm run build:electron
        env:
          CI: true
